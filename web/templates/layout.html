<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}クロック{{end}}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0d0f10;
            --bg-raised: #141719;
            --surface: #191d20;
            --surface-strong: #20262a;
            --surface-hover: #252c30;
            --border: #30383d;
            --border-strong: #465159;
            --primary: #25d0b5;
            --primary-hover: #52e1ca;
            --accent: #ff4d86;
            --warning: #f2bf4b;
            --text: #eef3f2;
            --text-muted: #9ca9aa;
            --text-soft: #c5d0cf;
            --text-on-primary: #07110f;
            --success: #56d991;
            --danger: #ff5d61;
            --danger-hover: #ff7377;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            --focus: 0 0 0 3px rgba(37, 208, 181, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { color-scheme: dark; }

        body {
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background:
                radial-gradient(circle at 18% 0%, rgba(37, 208, 181, 0.13), transparent 34rem),
                radial-gradient(circle at 86% 10%, rgba(255, 77, 134, 0.12), transparent 30rem),
                linear-gradient(145deg, #0d0f10 0%, #111719 48%, #0d0f10 100%);
            color: var(--text);
            line-height: 1.6;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 70%);
        }

        a {
            color: var(--primary);
            text-decoration: none;
            text-underline-offset: 0.18em;
        }

        a:hover { color: var(--primary-hover); text-decoration: underline; }

        code, .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.86rem;
        }

        code {
            color: var(--text-soft);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            padding: 0.05rem 0.3rem;
        }

        .app-nav {
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(13, 15, 16, 0.82);
            backdrop-filter: blur(18px);
        }

        .nav-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0.9rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .brand-lockup {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            min-width: 0;
        }

        .brand-mark {
            width: 2rem;
            height: 2rem;
            border: 1px solid rgba(37, 208, 181, 0.45);
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(37, 208, 181, 0.22), rgba(255, 77, 134, 0.12)),
                var(--surface);
            box-shadow: inset 0 0 18px rgba(37, 208, 181, 0.14), 0 0 24px rgba(37, 208, 181, 0.08);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            padding: 6px;
        }

        .brand-mark span {
            border-radius: 2px;
            background: var(--primary);
            box-shadow: 0 0 8px rgba(37, 208, 181, 0.7);
        }

        .brand {
            color: #fff;
            font-size: 1.22rem;
            font-weight: 800;
            letter-spacing: 0;
            text-decoration: none;
            text-shadow:
                0 0 7px var(--accent),
                0 0 20px var(--accent),
                0 0 40px color-mix(in srgb, var(--accent) 60%, transparent);
        }

        .brand:hover { color: #fff; text-decoration: none; }

        .brand-subtitle {
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.035);
        }

        .nav-links a {
            color: var(--text-muted);
            border-radius: 6px;
            padding: 0.45rem 0.8rem;
            font-size: 0.9rem;
            font-weight: 650;
            text-decoration: none;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
            background: rgba(255, 255, 255, 0.07);
        }

        .container {
            position: relative;
            width: min(1180px, 100%);
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
        }

        h1 {
            font-size: clamp(1.7rem, 2.8vw, 2.35rem);
            line-height: 1.1;
            margin-bottom: 1.1rem;
            letter-spacing: 0;
        }

        h2 {
            color: var(--text);
            font-size: 1.05rem;
            line-height: 1.25;
            margin-bottom: 0.75rem;
            letter-spacing: 0;
        }

        p { color: var(--text-soft); }

        .page-heading {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 1.5rem;
            margin-bottom: 1.25rem;
        }

        .eyebrow {
            color: var(--primary);
            font-size: 0.72rem;
            font-weight: 850;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 0.35rem;
        }

        .page-heading h1 { margin-bottom: 0.35rem; }

        .page-copy {
            max-width: 44rem;
            color: var(--text-muted);
            font-size: 0.98rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
            margin-bottom: 1.1rem;
        }

        .stat-card {
            min-height: 7.4rem;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(37, 208, 181, 0.095), transparent 52%),
                rgba(20, 23, 25, 0.82);
            box-shadow: var(--shadow);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .stat-value {
            margin-top: 0.45rem;
            color: var(--text);
            font-size: clamp(1.65rem, 2.6vw, 2.25rem);
            font-weight: 850;
            line-height: 1;
            overflow-wrap: anywhere;
        }

        .stat-note {
            margin-top: 0.6rem;
            color: var(--text-muted);
            font-size: 0.86rem;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(20, 23, 25, 0.78);
        }

        th, td {
            text-align: left;
            padding: 0.82rem 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.065);
            vertical-align: middle;
        }

        th {
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.035);
            font-size: 0.74rem;
            font-weight: 750;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        tr:last-child td { border-bottom: 0; }
        tr:hover td { background: rgba(37, 208, 181, 0.045); }

        .btn {
            display: inline-flex;
            min-height: 2.2rem;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.45rem 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.055);
            color: var(--text);
            font-size: 0.86rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, color 140ms ease;
        }

        .btn:hover {
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.09);
            color: var(--text);
            text-decoration: none;
            transform: translateY(-1px);
        }

        .btn:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: none;
            box-shadow: var(--focus);
            border-color: var(--primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8ae6a8);
            border-color: rgba(37, 208, 181, 0.35);
            color: var(--text-on-primary);
            box-shadow: 0 10px 26px rgba(37, 208, 181, 0.16);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-hover), #a1f0b9);
            color: var(--text-on-primary);
        }

        .btn-danger {
            background: rgba(255, 93, 97, 0.08);
            color: #ff8f92;
            border-color: rgba(255, 93, 97, 0.45);
        }

        .btn-danger:hover {
            background: rgba(255, 93, 97, 0.18);
            color: #ffc8ca;
            border-color: var(--danger-hover);
        }

        .btn-sm {
            min-height: 1.9rem;
            padding: 0.28rem 0.58rem;
            font-size: 0.8rem;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
            align-items: center;
        }

        form.inline { display: inline; }

        .form-group { margin-bottom: 1rem; }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea,
        .entry-field input,
        .entry-field select {
            width: 100%;
            min-height: 2.55rem;
            padding: 0.56rem 0.72rem;
            background: rgba(9, 11, 12, 0.7);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font: inherit;
            font-size: 0.92rem;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder,
        .entry-field input::placeholder {
            color: #687577;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .form-checkbox label {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            color: var(--text-soft);
            font-weight: 600;
        }

        .form-checkbox input {
            width: 1rem;
            min-height: 1rem;
            accent-color: var(--primary);
        }

        .form-hint {
            margin-top: 0.75rem;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .section-note {
            margin-bottom: 0.9rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .mt-1 { margin-top: 1rem; }

        .card {
            position: relative;
            padding: 1.15rem;
            margin-bottom: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.015)),
                rgba(20, 23, 25, 0.9);
            box-shadow: var(--shadow);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 1.38rem;
            padding: 0.14rem 0.52rem;
            border-radius: 5px;
            font-size: 0.73rem;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
        }

        .badge-success {
            background: rgba(86, 217, 145, 0.14);
            border: 1px solid rgba(86, 217, 145, 0.45);
            color: #8cf0b9;
        }

        .badge-muted {
            background: rgba(255, 255, 255, 0.055);
            border: 1px solid rgba(255, 255, 255, 0.095);
            color: var(--text-soft);
        }

        .badge-warning {
            background: rgba(242, 191, 75, 0.16);
            border: 1px solid rgba(242, 191, 75, 0.48);
            color: #ffd777;
        }

        .badge-alert {
            background: rgba(255, 77, 134, 0.16);
            border: 1px solid rgba(255, 77, 134, 0.5);
            color: #ffb0c9;
        }

        .status-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(17rem, 22rem);
            gap: 1.25rem;
            align-items: start;
        }

        .status-meta,
        .firmware-meta {
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
            min-width: 0;
        }

        .status-row {
            display: grid;
            grid-template-columns: 7rem minmax(0, 1fr);
            gap: 0.75rem;
            align-items: center;
            min-width: 0;
            font-size: 0.92rem;
        }

        .status-row > span:last-child { min-width: 0; overflow-wrap: anywhere; }

        .status-label,
        .entry-field label {
            color: var(--text-muted);
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .virtual-display {
            min-height: 6.1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent),
                #050606;
            box-shadow: inset 0 0 34px rgba(0, 0, 0, 0.8), 0 16px 36px rgba(0, 0, 0, 0.26);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff7a2f;
            overflow: hidden;
        }

        .virtual-max7219 { width: 100%; max-width: 22rem; height: 6.1rem; }
        .virtual-tm1637 { width: 100%; max-width: 17rem; height: 6.1rem; justify-self: end; }
        .virtual-placeholder { color: var(--text-muted); font-size: 0.82rem; font-style: italic; }

        .v-clock {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-weight: 800;
            letter-spacing: 0;
            color: #ff7a2f;
            text-shadow: 0 0 6px rgba(255, 122, 47, 0.8), 0 0 18px rgba(255, 122, 47, 0.42);
        }

        .virtual-max7219 .v-clock,
        .virtual-tm1637 .v-clock {
            font-size: 2.6rem;
        }

        .v-scroll {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            color: #ff7a2f;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-weight: 700;
            font-size: 1.55rem;
            text-shadow: 0 0 6px rgba(255, 122, 47, 0.78);
        }

        .v-scroll > span {
            display: inline-block;
            padding-left: 100%;
            animation: v-marquee linear infinite;
            animation-duration: var(--v-scroll-duration, 8s);
            animation-iteration-count: var(--v-scroll-iter, infinite);
        }

        @keyframes v-marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-100%); }
        }

        .v-message-tm {
            color: #ff7a2f;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 2rem;
            letter-spacing: 0.08em;
            text-shadow: 0 0 6px rgba(255, 122, 47, 0.78);
        }

        .v-animation {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #ff7a2f;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 1.1rem;
            letter-spacing: 0;
        }

        .v-anim-led {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff7a2f;
            box-shadow: 0 0 8px rgba(255, 122, 47, 0.9);
            animation: v-anim-pulse 1s ease-in-out infinite;
        }

        @keyframes v-anim-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(255, 122, 47, 0.9); }
            50% { opacity: 0.35; box-shadow: 0 0 2px rgba(255, 122, 47, 0.4); }
        }

        .alerts-section {
            margin-top: 1.05rem;
            padding-top: 0.95rem;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
        }

        .alerts-header { margin-bottom: 0.55rem; }

        .alerts-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .alert-item {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 0.65rem;
            align-items: center;
            padding: 0.55rem 0.65rem;
            border: 1px solid rgba(255, 255, 255, 0.075);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.035);
            font-size: 0.9rem;
        }

        .alert-msg { color: var(--text); min-width: 0; overflow-wrap: anywhere; }
        .alert-duration, .alerts-empty { color: var(--text-muted); font-size: 0.84rem; }
        .alerts-empty { font-style: italic; }

        .entry-row {
            display: grid;
            grid-template-columns: auto auto minmax(0, 1fr);
            gap: 0.8rem;
            align-items: start;
            padding: 0.9rem;
            margin-bottom: 0.65rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.035);
        }

        .entry-reorder {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .entry-position {
            min-width: 1.6rem;
            padding-top: 1.45rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 800;
            text-align: center;
        }

        .entry-body {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            min-width: 0;
        }

        .entry-top {
            display: grid;
            grid-template-columns: minmax(8rem, 1fr) minmax(7rem, 0.8fr) minmax(10rem, 1.4fr) auto;
            gap: 0.65rem;
            align-items: end;
        }

        .entry-panels {
            padding-top: 0.7rem;
            border-top: 1px dashed rgba(255, 255, 255, 0.13);
        }

        .entry-panel {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.65rem;
            align-items: end;
        }

        .entry-panel[hidden] { display: none; }

        .entry-field {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .entry-field label { margin-bottom: 0.28rem; }

        .entry-field input[readonly] {
            opacity: 0.58;
            cursor: not-allowed;
        }

        .entry-field-wide { grid-column: span 2; }
        .field-soft-disabled label { opacity: 0.58; }
        .entry-delete { align-self: end; }

        .entry-note {
            grid-column: 1 / -1;
            color: var(--text-soft);
            font-size: 0.88rem;
            font-style: italic;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0.7rem 0.8rem;
            border-radius: 7px;
        }

        .entry-details { font-size: 0.9rem; }
        .entry-duration { color: var(--text-muted); font-size: 0.85rem; }
        .entry-add { margin-top: 0.5rem; }

        .empty-state {
            min-height: 8rem;
            display: grid;
            place-items: center;
            padding: 2rem;
            border: 1px dashed rgba(255, 255, 255, 0.16);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.025);
            color: var(--text-muted);
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.1rem;
        }

        .flash {
            padding: 0.75rem 0.95rem;
            border-radius: 7px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .flash-success {
            background: rgba(86, 217, 145, 0.12);
            border: 1px solid rgba(86, 217, 145, 0.38);
            color: #9af3c2;
        }

        .flash-error {
            background: rgba(255, 93, 97, 0.12);
            border: 1px solid rgba(255, 93, 97, 0.38);
            color: #ffb2b4;
        }

        .pending-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem;
            border: 1px solid rgba(242, 191, 75, 0.38);
            border-radius: 8px;
            background: rgba(242, 191, 75, 0.08);
        }

        [hx-indicator] .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }

        @media (max-width: 860px) {
            .nav-inner { align-items: flex-start; flex-direction: column; }
            .nav-links { width: 100%; overflow-x: auto; }
            .page-heading { align-items: start; flex-direction: column; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .status-grid { grid-template-columns: 1fr; }
            .virtual-tm1637, .virtual-max7219 { justify-self: stretch; max-width: none; }
            .entry-top { grid-template-columns: 1fr 1fr; }
            .entry-panel { grid-template-columns: 1fr 1fr; }
            .entry-field-wide { grid-column: span 2; }
        }

        @media (max-width: 640px) {
            .container { padding: 1.25rem 1rem 2rem; }
            .nav-inner { padding: 0.8rem 1rem; }
            .brand-subtitle { display: none; }
            .top-bar, .card-header, .pending-banner { align-items: stretch; flex-direction: column; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
            table { display: block; overflow-x: auto; white-space: nowrap; }
            .status-row { grid-template-columns: 1fr; gap: 0.15rem; }
            .entry-row { grid-template-columns: auto minmax(0, 1fr); }
            .entry-position { display: none; }
            .entry-top, .entry-panel { grid-template-columns: 1fr; }
            .entry-field-wide { grid-column: span 1; }
            .actions { width: 100%; }
            .actions .btn { flex: 1 1 auto; }
        }
    </style>
</head>
<body>
    <nav class="app-nav">
        <div class="nav-inner">
            <div class="brand-lockup">
                <a href="/admin" class="brand-mark" aria-label="Kurokku dashboard"><span></span><span></span><span></span><span></span></a>
                <div>
                    <a href="/admin" class="brand">クロック</a>
                    <div class="brand-subtitle">ESP display control plane</div>
                </div>
            </div>
            <div class="nav-links" aria-label="Admin navigation">
                <a href="/admin" data-nav-root="/admin">Dashboard</a>
                <a href="/admin/devices" data-nav-root="/admin/devices">Devices</a>
                <a href="/admin/playlists" data-nav-root="/admin/playlists">Playlists</a>
            </div>
        </div>
    </nav>
    <main class="container">
        {{block "content" .}}{{end}}
    </main>
    <script>
        (function () {
            var path = window.location.pathname.replace(/\/$/, '') || '/admin';
            document.querySelectorAll('.nav-links a').forEach(function (link) {
                var root = link.dataset.navRoot;
                var active = root === '/admin' ? path === '/admin' : path === root || path.indexOf(root + '/') === 0;
                if (active) link.classList.add('active');
            });
        })();

        // Virtual display: tick clocks every second and set scroll durations.
        (function () {
            function pad(n) { return n < 10 ? '0' + n : '' + n; }
            function tickClocks() {
                var now = new Date();
                var h24 = now.getHours();
                var m = pad(now.getMinutes());
                document.querySelectorAll('.v-clock').forEach(function (el) {
                    var is24 = el.dataset.format24h === 'true';
                    var h = is24 ? pad(h24) : pad(((h24 + 11) % 12) + 1);
                    el.textContent = h + ':' + m;
                });
            }
            function applyScrolls() {
                document.querySelectorAll('.v-scroll').forEach(function (el) {
                    if (el.dataset.vScrollApplied === '1') return;
                    var speed = parseInt(el.dataset.scrollMs, 10) || 50;
                    var span = el.querySelector('span');
                    var textLen = span ? span.textContent.length : 0;
                    // Rough: one "pixel" per ms per char + viewport width pad.
                    var durationMs = (textLen + 32) * speed;
                    if (durationMs < 2000) durationMs = 2000;
                    el.style.setProperty('--v-scroll-duration', (durationMs / 1000).toFixed(1) + 's');
                    var repeats = parseInt(el.dataset.repeats, 10);
                    if (!isNaN(repeats) && repeats > 0) {
                        el.style.setProperty('--v-scroll-iter', repeats);
                    } else {
                        el.style.setProperty('--v-scroll-iter', 'infinite');
                    }
                    el.dataset.vScrollApplied = '1';
                });
            }
            tickClocks();
            applyScrolls();
            setInterval(tickClocks, 1000);
            // After HTMX swaps, re-apply.
            document.body.addEventListener('htmx:afterSwap', function () {
                tickClocks();
                applyScrolls();
            });
        })();
    </script>
</body>
</html>
