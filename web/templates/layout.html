<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}クロック{{end}}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface-hover: #1a2744;
            --border: #0f3460;
            --primary: #e94560;
            --primary-hover: #c73a52;
            --text: #eee;
            --text-muted: #8892a4;
            --success: #4ecca3;
            --danger: #e94560;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        nav .brand {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
            text-decoration: none;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        nav a:hover, nav a.active { color: var(--text); }
        .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        h2 { font-size: 1.2rem; margin-bottom: 0.75rem; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        th, td {
            text-align: left;
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        tr:hover td { background: var(--surface-hover); }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
        }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: var(--text); }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
        .actions { display: flex; gap: 0.5rem; align-items: center; }
        form.inline { display: inline; }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.9rem;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-success { background: var(--success); color: #111; }
        .badge-muted { background: var(--border); color: var(--text-muted); }
        .entry-row {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 0.75rem;
            align-items: center;
        }
        .entry-position {
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.85rem;
            min-width: 1.5rem;
            text-align: center;
        }
        .entry-details { font-size: 0.9rem; }
        .entry-duration { color: var(--text-muted); font-size: 0.85rem; }
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .flash {
            padding: 0.6rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .flash-success { background: rgba(78, 204, 163, 0.15); border: 1px solid var(--success); color: var(--success); }
        .flash-error { background: rgba(233, 69, 96, 0.15); border: 1px solid var(--danger); color: var(--danger); }
        [hx-indicator] .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin" class="brand">クロック</a>
        <a href="/admin/devices">Devices</a>
        <a href="/admin/playlists">Playlists</a>
    </nav>
    <div class="container">
        {{block "content" .}}{{end}}
    </div>
</body>
</html>
